name: CI – Build, JUnit & Randoop Tests

# ──────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [ main, master ]   # runs on every PR targeting main/master
  push:
    branches: [ main, master ]   # also runs on direct pushes (optional safety net)

# ──────────────────────────────────────────────────────────────
# Permissions – least privilege
# ──────────────────────────────────────────────────────────────
permissions:
  contents: read
  checks: write        # lets the workflow post test results back to the PR

jobs:
  # ============================================================
  # JOB 1 – Compile & run hand-written JUnit tests
  # ============================================================
  junit:
    name: "JUnit Tests"
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 17 (change to 11 or 21 if your project needs it)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Download JUnit 5 + Randoop jars into a local lib/ folder
      #    (no Maven/Gradle required – pure javac workflow)
      - name: Download test dependencies
        run: |
          mkdir -p lib

          # JUnit 5 Platform Console Standalone (runs JUnit 4 & 5 tests via CLI)
          curl -sSL -o lib/junit-platform-console-standalone.jar \
            "https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar"

          # JUnit 4 (keep if any of your tests still use @org.junit.Test)
          curl -sSL -o lib/junit4.jar \
            "https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar"

          # Hamcrest (JUnit 4 dependency)
          curl -sSL -o lib/hamcrest.jar \
            "https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar"

      # 4. Compile main sources
      - name: Compile main sources
        run: |
          mkdir -p out/main
          # Find every .java file under src/ that is NOT in a test package
          find src -name "*.java" ! -path "*/test/*" > sources_main.txt
          if [ -s sources_main.txt ]; then
            javac -cp "lib/*" -d out/main @sources_main.txt
          else
            echo "No main sources found – skipping compile."
          fi

      # 5. Compile test sources (hand-written JUnit tests)
      - name: Compile JUnit test sources
        run: |
          mkdir -p out/test
          find src -name "*.java" -path "*/test/*" > sources_test.txt
          if [ -s sources_test.txt ]; then
            javac -cp "lib/*:out/main" -d out/test @sources_test.txt
          else
            echo "No test sources found under src/test – skipping."
          fi

      # 6. Run JUnit tests and produce XML reports
      - name: Run JUnit tests
        run: |
          mkdir -p test-results/junit
          if [ -d out/test ] && [ "$(ls -A out/test)" ]; then
            java -jar lib/junit-platform-console-standalone.jar \
              --class-path "out/main:out/test:lib/*" \
              --scan-class-path \
              --reports-dir test-results/junit \
              --fail-if-no-tests=false \
              || true   # don't fail the step yet – let the report action decide
          else
            echo "No compiled test classes – nothing to run."
          fi

      # 7. Publish JUnit test results as a PR check annotation
      - name: Publish JUnit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()   # run even if previous steps failed
        with:
          files: test-results/junit/**/*.xml
          check_name: "JUnit Test Results"
          comment_mode: always

      # 8. Upload raw XML as an artifact for later inspection
      - name: Upload JUnit XML reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-reports
          path: test-results/junit/

  # ============================================================
  # JOB 2 – Randoop regression-test generation & execution
  # ============================================================
  randoop:
    name: "Randoop Regression Tests"
    runs-on: ubuntu-latest
    needs: junit   # only run if compilation succeeded in job 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Re-download deps (each job starts fresh)
      - name: Download dependencies
        run: |
          mkdir -p lib

          curl -sSL -o lib/junit-platform-console-standalone.jar \
            "https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar"

          curl -sSL -o lib/junit4.jar \
            "https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar"

          curl -sSL -o lib/hamcrest.jar \
            "https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar"

          # Randoop (latest stable)
          curl -sSL -o lib/randoop.jar \
            "https://github.com/randoop/randoop/releases/download/v4.3.2/randoop-4.3.2.jar"

      # Compile main sources (needed by Randoop)
      - name: Compile main sources
        run: |
          mkdir -p out/main
          find src -name "*.java" ! -path "*/test/*" > sources_main.txt
          if [ -s sources_main.txt ]; then
            javac -cp "lib/*" -d out/main @sources_main.txt
          else
            echo "No main sources found."
          fi

      # Discover all non-test class names for Randoop
      - name: Collect class list for Randoop
        run: |
          # Convert compiled .class files to fully-qualified class names
          find out/main -name "*.class" ! -name "*\$*" \
            | sed 's|out/main/||; s|/|.|g; s|\.class$||' \
            > randoop_classes.txt
          echo "=== Classes to be tested by Randoop ==="
          cat randoop_classes.txt

      # Run Randoop to generate regression tests
      - name: Generate Randoop regression tests
        run: |
          mkdir -p randoop-generated
          CLASS_LIST=$(paste -sd: randoop_classes.txt)

          # If no classes were found, skip gracefully
          if [ -z "$CLASS_LIST" ]; then
            echo "No classes found – skipping Randoop generation."
            exit 0
          fi

          # Generate tests with a 60-second time limit
          # Adjust --time-limit and --output-limit to taste
          java -cp "out/main:lib/randoop.jar:lib/junit4.jar:lib/hamcrest.jar" \
            randoop.main.Main gentests \
            --testclass=$(cat randoop_classes.txt | tr '\n' ' ' | sed 's/ / --testclass=/g' | sed 's/ --testclass=$//' | sed 's/^//' ) \
            --time-limit=60 \
            --output-limit=500 \
            --junit-output-dir=randoop-generated \
            --regression-test-basename=RandoopRegression \
            --error-test-basename=RandoopError \
            2>&1 | tee randoop-generation.log || true

          echo "=== Generated files ==="
          ls randoop-generated/ || echo "(none)"

      # Compile the generated Randoop tests
      - name: Compile Randoop-generated tests
        run: |
          if [ -z "$(ls randoop-generated/*.java 2>/dev/null)" ]; then
            echo "No Randoop test files generated – skipping compile."
            exit 0
          fi
          mkdir -p out/randoop
          javac -cp "out/main:lib/junit4.jar:lib/hamcrest.jar:lib/junit-platform-console-standalone.jar" \
            -d out/randoop \
            randoop-generated/*.java

      # Run Randoop regression tests
      - name: Run Randoop regression tests
        run: |
          if [ ! -d out/randoop ] || [ -z "$(ls -A out/randoop)" ]; then
            echo "No compiled Randoop tests – skipping execution."
            exit 0
          fi
          mkdir -p test-results/randoop
          java -jar lib/junit-platform-console-standalone.jar \
            --class-path "out/main:out/randoop:lib/*" \
            --scan-class-path \
            --reports-dir test-results/randoop \
            --fail-if-no-tests=false \
            || true

      # Publish Randoop results as a PR check annotation
      - name: Publish Randoop Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/randoop/**/*.xml
          check_name: "Randoop Regression Test Results"
          comment_mode: always

      # Upload all generated Randoop artifacts
      - name: Upload Randoop artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: randoop-artifacts
          path: |
            randoop-generated/
            randoop-generation.log
            test-results/randoop/
