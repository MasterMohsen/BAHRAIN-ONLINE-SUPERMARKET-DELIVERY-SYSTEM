name: CI - Build JUnit and EvoSuite Tests

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:

  # ============================================================
  # JOB 1 - JUnit (hand-written tests) - runs on Java 17
  # ============================================================
  junit:
    name: JUnit Tests
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JUnit dependencies
        run: |
          mkdir -p lib
          curl -sSL -o lib/junit-platform-console-standalone.jar "https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar"
          curl -sSL -o lib/junit4.jar "https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar"
          curl -sSL -o lib/hamcrest.jar "https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar"

      - name: Show source tree
        run: find src -type f -name "*.java" | sort

      - name: Compile main sources
        run: |
          mkdir -p out/main
          find src -name "*.java" \
            ! -path "*/test/*" \
            ! -name "entry.java" \
            > sources_main.txt
          echo "--- Main sources ---"
          cat sources_main.txt
          javac -cp "lib/*" -d out/main @sources_main.txt
          echo "--- Compiled classes ---"
          find out/main -name "*.class" | sort

      - name: Compile test sources
        run: |
          mkdir -p out/test
          find src -path "*/test/*" -name "*.java" > sources_test.txt
          echo "--- Test sources ---"
          cat sources_test.txt
          if [ -s sources_test.txt ]; then
            javac -cp "lib/*:out/main" -d out/test @sources_test.txt
          else
            echo "No test sources found"
          fi

      - name: Run JUnit tests
        run: |
          mkdir -p test-results/junit
          if [ -z "$(find out/test -name '*.class' 2>/dev/null)" ]; then
            printf '<?xml version="1.0" encoding="UTF-8"?>\n<testsuite name="NoTests" tests="0" failures="0" errors="0" skipped="0"/>\n' > test-results/junit/empty.xml
            exit 0
          fi
          java -jar lib/junit-platform-console-standalone.jar \
            --class-path "out/main:out/test:lib/*" \
            --scan-class-path \
            --reports-dir test-results/junit \
            --fail-if-no-tests=false

      - name: Publish JUnit results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/junit/**/*.xml
          check_name: JUnit Test Results
          comment_mode: always

      - name: Upload JUnit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-reports
          path: test-results/junit/

  # ============================================================
  # JOB 2 - EvoSuite - MUST run on Java 8
  # EvoSuite 1.0.6 requires tools.jar which only exists in JDK 8
  # tools.jar was removed in JDK 9+ causing the fatal crash
  # We compile with Java 8, generate with Java 8, run with Java 8
  # ============================================================
  evosuite:
    name: EvoSuite Generated Tests
    runs-on: ubuntu-latest
    needs: junit
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # Java 8 is required - tools.jar only exists in JDK 8
      - name: Set up JDK 8 for EvoSuite
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Verify Java version and tools.jar location
        run: |
          java -version
          echo "JAVA_HOME: $JAVA_HOME"
          echo "--- Looking for tools.jar ---"
          find "$JAVA_HOME" -name "tools.jar" 2>/dev/null || echo "tools.jar not found"

      - name: Download dependencies
        run: |
          mkdir -p lib
          curl -sSL -o lib/junit4.jar "https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar"
          curl -sSL -o lib/hamcrest.jar "https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar"
          curl -sSL -o lib/junit-platform-console-standalone.jar "https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar"
          curl -sSL -o lib/evosuite.jar "https://github.com/EvoSuite/evosuite/releases/download/v1.0.6/evosuite-1.0.6.jar"
          curl -sSL -o lib/evosuite-runtime.jar "https://github.com/EvoSuite/evosuite/releases/download/v1.0.6/evosuite-standalone-runtime-1.0.6.jar"
          echo "--- Downloaded JARs ---"
          ls -lh lib/

      - name: Compile main sources with Java 8
        run: |
          mkdir -p out/main
          find src -name "*.java" \
            ! -path "*/test/*" \
            ! -name "entry.java" \
            > sources_main.txt
          echo "--- Compiling ---"
          cat sources_main.txt
          # -source 8 -target 8 ensures bytecode is compatible with EvoSuite
          javac -source 8 -target 8 -cp "lib/*" -d out/main @sources_main.txt
          echo "--- .class files ---"
          find out/main -name "*.class" | sort

      - name: Generate EvoSuite tests
        run: |
          mkdir -p evosuite-tests

          # Pass tools.jar location explicitly to avoid the fatal crash
          TOOLS_JAR=$(find "$JAVA_HOME" -name "tools.jar" 2>/dev/null | head -1)
          echo "--- tools.jar found at: $TOOLS_JAR ---"

          echo "--- Running EvoSuite on out/main ---"

          java -jar lib/evosuite.jar \
            -target out/main \
            -projectCP out/main \
            -criterion BRANCH \
            -Dsearch_budget=60 \
            -Dtest_dir=evosuite-tests \
            ${TOOLS_JAR:+-Dtools_jar_location=$TOOLS_JAR} \
            2>&1 | tee evosuite-generation.log

          echo "--- Generated test files ---"
          find evosuite-tests -name "*.java" | sort
          echo "--- Total: $(find evosuite-tests -name '*.java' | wc -l) file(s) ---"

      - name: Compile EvoSuite generated tests
        run: |
          COUNT=$(find evosuite-tests -name "*.java" 2>/dev/null | wc -l)
          echo "EvoSuite generated $COUNT test file(s)"
          mkdir -p test-results/evosuite

          if [ "$COUNT" -eq 0 ]; then
            echo "No tests generated - check evosuite-generation.log in artifacts"
            printf '<?xml version="1.0" encoding="UTF-8"?>\n<testsuite name="EvoSuiteNoTests" tests="0" failures="0" errors="0" skipped="0"/>\n' > test-results/evosuite/empty.xml
            exit 0
          fi

          mkdir -p out/evosuite
          find evosuite-tests -name "*.java" > evosuite_sources.txt
          echo "--- Compiling EvoSuite tests ---"
          cat evosuite_sources.txt

          javac -source 8 -target 8 \
            -cp "out/main:lib/junit4.jar:lib/hamcrest.jar:lib/evosuite-runtime.jar" \
            -d out/evosuite \
            @evosuite_sources.txt

          echo "--- Compiled classes ---"
          find out/evosuite -name "*.class" | sort

      - name: Run EvoSuite tests
        run: |
          mkdir -p test-results/evosuite

          if [ -z "$(find out/evosuite -name '*.class' 2>/dev/null)" ]; then
            echo "No compiled EvoSuite tests to run"
            exit 0
          fi

          java -jar lib/junit-platform-console-standalone.jar \
            --class-path "out/main:out/evosuite:lib/junit4.jar:lib/hamcrest.jar:lib/evosuite-runtime.jar" \
            --scan-class-path \
            --reports-dir test-results/evosuite \
            --fail-if-no-tests=false

          echo "--- test-results/evosuite/ ---"
          ls -la test-results/evosuite/

      - name: Publish EvoSuite results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/evosuite/**/*.xml
          check_name: EvoSuite Generated Test Results
          comment_mode: always

      - name: Upload EvoSuite artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evosuite-artifacts
          path: |
            evosuite-tests/
            evosuite-generation.log
            test-results/evosuite/