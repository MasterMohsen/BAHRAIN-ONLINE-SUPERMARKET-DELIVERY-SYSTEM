name: CI - Build JUnit and Randoop Tests

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:

  junit:
    name: JUnit Tests
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JUnit dependencies
        run: |
          mkdir -p lib
          curl -sSL -o lib/junit-platform-console-standalone.jar "https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar"
          curl -sSL -o lib/junit4.jar "https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar"
          curl -sSL -o lib/hamcrest.jar "https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar"

      - name: Show full source tree
        run: find src -type f -name "*.java" | sort

      - name: Compile main sources
        run: |
          mkdir -p out/main
          find src -name "*.java" \
            ! -path "*/test/*" \
            ! -name "entry.java" \
            > sources_main.txt
          echo "--- Main sources ---"
          cat sources_main.txt
          javac -cp "lib/*" -d out/main @sources_main.txt
          echo "--- Compiled .class files ---"
          find out/main -name "*.class" | sort

      - name: Compile test sources
        run: |
          mkdir -p out/test
          find src -path "*/test/*" -name "*.java" > sources_test.txt
          echo "--- Test sources ---"
          cat sources_test.txt
          if [ -s sources_test.txt ]; then
            javac -cp "lib/*:out/main" -d out/test @sources_test.txt
          else
            echo "No test sources found"
          fi

      - name: Run JUnit tests
        run: |
          mkdir -p test-results/junit
          if [ -z "$(find out/test -name '*.class' 2>/dev/null)" ]; then
            printf '<?xml version="1.0" encoding="UTF-8"?>\n<testsuite name="NoTests" tests="0" failures="0" errors="0" skipped="0"/>\n' > test-results/junit/empty.xml
            exit 0
          fi
          java -jar lib/junit-platform-console-standalone.jar \
            --class-path "out/main:out/test:lib/*" \
            --scan-class-path \
            --reports-dir test-results/junit \
            --fail-if-no-tests=false

      - name: Publish JUnit results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/junit/**/*.xml
          check_name: JUnit Test Results
          comment_mode: always

      - name: Upload JUnit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-reports
          path: test-results/junit/

  randoop:
    name: Randoop Regression Tests
    runs-on: ubuntu-latest
    needs: junit
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download dependencies
        run: |
          mkdir -p lib
          curl -sSL -o lib/junit4.jar "https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar"
          curl -sSL -o lib/hamcrest.jar "https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar"
          curl -sSL -o lib/junit-platform-console-standalone.jar "https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar"
          curl -sSL -o lib/randoop.jar "https://github.com/randoop/randoop/releases/download/v4.3.2/randoop-4.3.2.jar"

      # ── Step 1: Compile ──────────────────────────────────────
      # -verbose flag shows exactly which source file maps to
      # which package, so we can see the real package names
      - name: Compile main sources
        run: |
          mkdir -p out/main
          find src -name "*.java" \
            ! -path "*/test/*" \
            ! -name "entry.java" \
            > sources_main.txt
          echo "--- Files being compiled ---"
          cat sources_main.txt
          javac -verbose -cp "lib/*" -d out/main @sources_main.txt 2>&1 \
            | grep "^\[" | head -40
          echo "--- .class files produced ---"
          find out/main -name "*.class" | sort

      # ── Step 2: Detect package names from source files ───────
      # Read the actual "package X.Y.Z;" declaration from each
      # .java file and combine with the class name — this is the
      # only reliable way to get the fully-qualified class name
      - name: Detect class names from package declarations
        run: |
          > randoop_classes.txt
          while IFS= read -r javafile; do
            # Extract package line e.g. "package main.java;"
            pkg=$(grep -m1 "^package " "$javafile" | sed 's/package //; s/;//; s/ //g')
            # Extract public class name from filename
            classname=$(basename "$javafile" .java)
            if [ -n "$pkg" ]; then
              echo "${pkg}.${classname}" >> randoop_classes.txt
            else
              echo "${classname}" >> randoop_classes.txt
            fi
          done < sources_main.txt

          echo "--- Classes Randoop will test ---"
          cat randoop_classes.txt
          echo "--- Total: $(wc -l < randoop_classes.txt) class(es) ---"

      # ── Step 3: Run Randoop ──────────────────────────────────
      # No || true — we want to see real errors
      # All stdout & stderr go to the log file
      - name: Generate Randoop tests
        run: |
          mkdir -p randoop-generated

          if [ ! -s randoop_classes.txt ]; then
            echo "ERROR: randoop_classes.txt is empty — nothing to test"
            exit 1
          fi

          # Build --testclass= args one per line
          TESTCLASS_ARGS=""
          while IFS= read -r cls; do
            TESTCLASS_ARGS="$TESTCLASS_ARGS --testclass=$cls"
          done < randoop_classes.txt

          echo "--- Randoop command ---"
          echo "java -cp out/main:lib/randoop.jar:lib/junit4.jar:lib/hamcrest.jar"
          echo "  randoop.main.Main gentests"
          echo "  $TESTCLASS_ARGS"
          echo "  --time-limit=60 --output-limit=500"
          echo "  --junit-output-dir=randoop-generated"

          java -cp "out/main:lib/randoop.jar:lib/junit4.jar:lib/hamcrest.jar" \
            randoop.main.Main gentests \
            $TESTCLASS_ARGS \
            --time-limit=60 \
            --output-limit=500 \
            --junit-output-dir=randoop-generated \
            --regression-test-basename=RandoopRegression \
            --error-test-basename=RandoopError \
            --silently-ignore-bad-class-names=true \
            2>&1 | tee randoop-generation.log

          echo "--- Exit code: ${PIPESTATUS[0]} ---"
          echo "--- Generated files ---"
          ls -la randoop-generated/ || echo "(directory empty)"
          echo "--- .java count: $(find randoop-generated -name '*.java' | wc -l) ---"

      # ── Step 4: Compile generated tests ─────────────────────
      - name: Compile Randoop tests
        run: |
          COUNT=$(find randoop-generated -name "*.java" 2>/dev/null | wc -l)
          echo "Randoop generated $COUNT test file(s)"
          mkdir -p test-results/randoop
          if [ "$COUNT" -eq 0 ]; then
            echo "Check randoop-generation.log in the uploaded artifacts"
            printf '<?xml version="1.0" encoding="UTF-8"?>\n<testsuite name="RandoopNoTests" tests="0" failures="0" errors="0" skipped="0"/>\n' > test-results/randoop/empty.xml
            exit 0
          fi
          mkdir -p out/randoop
          find randoop-generated -name "*.java" > randoop_sources.txt
          javac -cp "out/main:lib/junit4.jar:lib/hamcrest.jar:lib/junit-platform-console-standalone.jar" \
            -d out/randoop \
            @randoop_sources.txt
          echo "--- Compiled Randoop test classes ---"
          find out/randoop -name "*.class" | sort

      # ── Step 5: Run generated tests ──────────────────────────
      - name: Run Randoop tests
        run: |
          mkdir -p test-results/randoop
          if [ -z "$(find out/randoop -name '*.class' 2>/dev/null)" ]; then
            echo "No compiled Randoop tests to run"
            exit 0
          fi
          java -jar lib/junit-platform-console-standalone.jar \
            --class-path "out/main:out/randoop:lib/*" \
            --scan-class-path \
            --reports-dir test-results/randoop \
            --fail-if-no-tests=false

      - name: Publish Randoop results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/randoop/**/*.xml
          check_name: Randoop Regression Test Results
          comment_mode: always

      # Upload everything including the log so we can diagnose
      - name: Upload Randoop artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: randoop-artifacts
          path: |
            randoop-generated/
            randoop-generation.log
            randoop_classes.txt
            sources_main.txt
            test-results/randoop/