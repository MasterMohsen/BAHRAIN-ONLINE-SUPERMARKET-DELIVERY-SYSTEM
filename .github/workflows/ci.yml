name: CI – Build, JUnit & Randoop Tests

# ──────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

# ──────────────────────────────────────────────────────────────
# Permissions – fixed: added pull-requests write so the action
# can post comments on PRs
# ──────────────────────────────────────────────────────────────
permissions:
  contents: read
  checks: write
  pull-requests: write   # ← was missing, caused the 403 error

jobs:
  # ============================================================
  # JOB 1 – Compile & run hand-written JUnit tests
  # ============================================================
  junit:
    name: "JUnit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Download all required JARs into lib/
      - name: Download test dependencies
        run: |
          mkdir -p lib

          curl -sSL -o lib/junit-platform-console-standalone.jar \
            "https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar"

          curl -sSL -o lib/junit4.jar \
            "https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar"

          curl -sSL -o lib/hamcrest.jar \
            "https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar"

          curl -sSL -o lib/mockito-core.jar \
            "https://repo1.maven.org/maven2/org/mockito/mockito-core/5.12.0/mockito-core-5.12.0.jar"

          curl -sSL -o lib/byte-buddy.jar \
            "https://repo1.maven.org/maven2/net/bytebuddy/byte-buddy/1.14.15/byte-buddy-1.14.15.jar"

          curl -sSL -o lib/byte-buddy-agent.jar \
            "https://repo1.maven.org/maven2/net/bytebuddy/byte-buddy-agent/1.14.15/byte-buddy-agent-1.14.15.jar"

          curl -sSL -o lib/objenesis.jar \
            "https://repo1.maven.org/maven2/org/objenesis/objenesis/3.3/objenesis-3.3.jar"

          curl -sSL -o lib/stripe-java.jar \
            "https://repo1.maven.org/maven2/com/stripe/stripe-java/24.22.0/stripe-java-24.22.0.jar"

      # Show the full source tree so we can debug what's found
      - name: Debug – show source tree
        run: |
          echo "=== Full src/ structure ==="
          find src -type f | sort
          echo ""
          echo "=== Java files found ==="
          find src -name "*.java" | sort

      # Compile ALL java files (main + test together) so imports resolve
      - name: Compile all sources
        run: |
          mkdir -p out/all
          find src -name "*.java" > all_sources.txt
          echo "=== Files to compile ==="
          cat all_sources.txt
          if [ -s all_sources.txt ]; then
            javac -cp "lib/*" -d out/all @all_sources.txt
            echo "Compilation succeeded"
          else
            echo "No Java files found under src/"
          fi

      # Detect test classes (any file containing @Test)
      - name: Detect test classes
        run: |
          echo "=== Scanning for test classes ==="
          grep -rl "@Test" src --include="*.java" \
            | sed 's|src/||; s|/|.|g; s|\.java$||' \
            > test_classes.txt || true
          echo "=== Test classes found ==="
          cat test_classes.txt || echo "(none)"

      # Run JUnit – scan entire classpath for @Test methods
      - name: Run JUnit tests
        run: |
          mkdir -p test-results/junit
          if [ ! -s test_classes.txt ]; then
            echo "No test classes detected – creating empty report"
            cat > test-results/junit/empty.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuite name="NoTests" tests="0" failures="0" errors="0" skipped="0"/>
          EOF
            exit 0
          fi

          java -jar lib/junit-platform-console-standalone.jar \
            --class-path "out/all:lib/*" \
            --scan-class-path \
            --reports-dir test-results/junit \
            --fail-if-no-tests=false

          echo "=== Contents of test-results/junit/ ==="
          ls -la test-results/junit/

      # Publish results to PR
      - name: Publish JUnit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/junit/**/*.xml
          check_name: "JUnit Test Results"
          comment_mode: always

      - name: Upload JUnit XML reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-reports
          path: test-results/junit/

  # ============================================================
  # JOB 2 – Randoop regression-test generation & execution
  # ============================================================
  randoop:
    name: "Randoop Regression Tests"
    runs-on: ubuntu-latest
    needs: junit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download dependencies
        run: |
          mkdir -p lib

          curl -sSL -o lib/junit-platform-console-standalone.jar \
            "https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar"

          curl -sSL -o lib/junit4.jar \
            "https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar"

          curl -sSL -o lib/hamcrest.jar \
            "https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar"

          curl -sSL -o lib/randoop.jar \
            "https://github.com/randoop/randoop/releases/download/v4.3.2/randoop-4.3.2.jar"
          curl -sSL -o lib/stripe-java.jar \
            "https://repo1.maven.org/maven2/com/stripe/stripe-java/24.22.0/stripe-java-24.22.0.jar"

      - name: Compile main (non-test) sources
        run: |
          mkdir -p out/main
          find src -name "*.java" \
            ! -name "*Test*.java" \
            ! -name "*test*.java" \
            ! -path "*/test/*" > sources_main.txt

          echo "=== Main sources ==="
          cat sources_main.txt

          if [ -s sources_main.txt ]; then
            javac -cp "lib/*" -d out/main @sources_main.txt
            echo "Main compilation succeeded"
          else
            echo "No main source files found"
            exit 0
          fi

      - name: Collect class list for Randoop
        run: |
          find out/main -name "*.class" ! -name "*\$*" \
            | sed 's|out/main/||; s|/|.|g; s|\.class$||' \
            > randoop_classes.txt
          echo "=== Classes for Randoop ==="
          cat randoop_classes.txt

      - name: Generate Randoop regression tests
        run: |
          mkdir -p randoop-generated

          if [ ! -s randoop_classes.txt ]; then
            echo "No classes found – skipping Randoop"
            exit 0
          fi

          # Build one --testclass= argument per class
          TESTCLASS_ARGS=$(awk '{print "--testclass=" $0}' randoop_classes.txt | tr '\n' ' ')

          java -cp "out/main:lib/randoop.jar:lib/junit4.jar:lib/hamcrest.jar" \
            randoop.main.Main gentests \
            $TESTCLASS_ARGS \
            --time-limit=60 \
            --output-limit=500 \
            --junit-output-dir=randoop-generated \
            --regression-test-basename=RandoopRegression \
            --error-test-basename=RandoopError \
            2>&1 | tee randoop-generation.log || true

          echo "=== Generated files ==="
          ls randoop-generated/ || echo "(none)"

      - name: Compile Randoop-generated tests
        run: |
          JAVA_FILES=$(find randoop-generated -name "*.java" 2>/dev/null | wc -l)
          if [ "$JAVA_FILES" -eq 0 ]; then
            echo "No Randoop test files generated – skipping"
            exit 0
          fi
          mkdir -p out/randoop
          javac -cp "out/main:lib/junit4.jar:lib/hamcrest.jar:lib/junit-platform-console-standalone.jar" \
            -d out/randoop \
            randoop-generated/*.java

      - name: Run Randoop regression tests
        run: |
          mkdir -p test-results/randoop
          if [ ! -d out/randoop ] || [ -z "$(ls -A out/randoop 2>/dev/null)" ]; then
            echo "No compiled Randoop tests – writing empty report"
            cat > test-results/randoop/empty.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuite name="NoRandoopTests" tests="0" failures="0" errors="0" skipped="0"/>
          EOF
            exit 0
          fi

          java -jar lib/junit-platform-console-standalone.jar \
            --class-path "out/main:out/randoop:lib/*" \
            --scan-class-path \
            --reports-dir test-results/randoop \
            --fail-if-no-tests=false

      - name: Publish Randoop Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/randoop/**/*.xml
          check_name: "Randoop Regression Test Results"
          comment_mode: always

      - name: Upload Randoop artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: randoop-artifacts
          path: |
            randoop-generated/
            randoop-generation.log
            test-results/randoop/